name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, tokenizer, gd, exif, fileinfo, ctype, json

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Create storage directories
        run: |
          mkdir -p storage/framework/views
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p bootstrap/cache
          chmod -R 775 storage bootstrap/cache

      - name: Install PHP dependencies
        run: |
          COMPOSER_MEMORY_LIMIT=-1 composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Install frontend dependencies
        run: |
          npm ci
          
      - name: Copy assets
        run: |
          mkdir -p public/css public/js
          cp -r resources/css/* public/css/ 2>/dev/null || :
          cp -r resources/js/* public/js/ 2>/dev/null || :

      - name: Debug Secrets
        run: |
          echo "🔍 Debugging GitHub Secrets..."
          echo "HOSTINGER_HOST: ${#HOSTINGER_HOST} characters"
          echo "HOSTINGER_USERNAME: ${#HOSTINGER_USERNAME} characters"
          echo "SSH_PRIVATE_KEY starts with: ${SSH_PRIVATE_KEY:0:30}..."
          echo "SSH_PRIVATE_KEY ends with: ...${SSH_PRIVATE_KEY: -30}"
          
          # Verify required secrets are set
          if [ -z "$HOSTINGER_HOST" ] || [ -z "$HOSTINGER_USERNAME" ] || [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "❌ ERROR: Missing required secrets!"
            echo "Please ensure these GitHub Secrets are set:"
            echo "- HOSTINGER_HOST"
            echo "- HOSTINGER_USERNAME"
            echo "- SSH_PRIVATE_KEY"
            exit 1
          fi
          echo "✅ All required secrets are present"

      - name: Setup SSH
        run: |
          echo "🚀 Starting SSH setup..."
          
          # Debug: Show current directory and files
          echo "📂 Current directory: $(pwd)"
          echo "📁 Listing files in ~/.ssh/ (if exists):"
          ls -la ~/.ssh/ 2>/dev/null || echo "No ~/.ssh/ directory exists yet"
          
          # Create .ssh directory with correct permissions
          echo "🔧 Creating .ssh directory..."
          mkdir -vp ~/.ssh/
          chmod -v 700 ~/.ssh/
          
          # Debug: Verify the secret exists and has content
          echo "🔑 Checking SSH private key..."
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "❌ ERROR: SSH_PRIVATE_KEY secret is empty or not set!"
            echo "Please make sure you've added the private key to GitHub Secrets"
            exit 1
          else
            echo "✅ SSH_PRIVATE_KEY secret exists"
            # Print first 10 chars of the key for verification (not the whole key for security)
            echo "   Key starts with: ${SSH_PRIVATE_KEY:0:10}..."
            
            # Write the private key
            echo "✏️ Writing private key..."
            echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
            chmod -v 600 ~/.ssh/id_rsa
            
            # Verify the key was written
            if [ -s ~/.ssh/id_rsa ]; then
              echo "✅ Private key written successfully"
              echo "   Key size: $(wc -c < ~/.ssh/id_rsa) bytes"
            else
              echo "❌ ERROR: Failed to write private key"
              exit 1
            fi
          fi
          
          # Add host to known_hosts
          echo "🌐 Adding host to known_hosts..."
          if [ -z "${{ secrets.HOSTINGER_HOST }}" ]; then
            echo "❌ ERROR: HOSTINGER_HOST secret is not set!"
            exit 1
          fi
          
          ssh-keyscan -H "${{ secrets.HOSTINGER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          chmod -v 600 ~/.ssh/known_hosts
          
          # Test SSH connection
          echo "🔌 Testing SSH connection..."
          if [ -n "${{ secrets.HOSTINGER_USERNAME }}" ] && [ -n "${{ secrets.HOSTINGER_HOST }}" ]; then
            ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -p ${SSH_PORT:-22} ${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }} "echo '✅ SSH connection successful!'; exit 0" || \
            { echo "❌ SSH connection failed"; exit 1; }
          else
            echo "⚠️  Skipping SSH test: HOSTINGER_USERNAME or HOSTINGER_HOST not set"
          fi
          
          echo "✨ SSH setup completed successfully!"

      - name: Deploy to Hostinger
        env:
          HOST: ${{ secrets.HOSTINGER_HOST }}
          USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          PORT: ${{ secrets.SSH_PORT || '22' }}
          TARGET_DIR: ${{ secrets.HOSTINGER_DEPLOY_PATH || '/home/u722035022/domains/driving.mkscholars.com/laravel' }}
        run: |
          # Ensure deployment folder exists
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -p $PORT $USERNAME@$HOST "mkdir -p $TARGET_DIR"
          
          # Sync files using rsync (faster than scp for multiple files)
          rsync -avz -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -p $PORT" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='storage' \
            --exclude='.env' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='.editorconfig' \
            --exclude='.styleci.yml' \
            --exclude='.php_cs' \
            --exclude='.phpunit.*' \
            --exclude='phpunit.xml' \
            --exclude='README.md' \
            --exclude='_ide_helper.php' \
            --exclude='.phpstorm.meta.php' \
            --exclude='tests' \
            --exclude='.php-cs-fixer.cache' \
            --exclude='.php-cs-fixer.dist.php' \
            --exclude='.php_cs.cache' \
            --exclude='.php_cs.dist' \
            --exclude='.phpcs.xml' \
            --exclude='.phpcs.xml.dist' \
            --exclude='.phplint.yml' \
            --exclude='.phpunit.result.cache' \
            --exclude='phpcs.xml' \
            --exclude='phpunit.xml.dist' \
            --exclude='phpunit.xml' \
            --exclude='storage' \
            --exclude='.env.example' \
            --exclude='.gitkeep' \
            --exclude='.htaccess' \
            --exclude='web.config' \
            --exclude='public/storage' \
            --delete \
            ./ $USERNAME@$HOST:$TARGET_DIR/
            
          # Set proper permissions
          ssh -i ~/.ssh/id_rsa -p $PORT $USERNAME@$HOST "chmod -R 775 $TARGET_DIR/bootstrap/cache $TARGET_DIR/storage"
          ssh -i ~/.ssh/id_rsa -p $PORT $USERNAME@$HOST "chmod -R 777 $TARGET_DIR/storage"

          # Copy .env if exists locally (optional)
          if [ -f .env ]; then
            scp -P $PORT -o StrictHostKeyChecking=no .env $USERNAME@$HOST:$TARGET_DIR/.env
          fi

          # Run server-side deployment script
          ssh -o StrictHostKeyChecking=no -p $PORT $USERNAME@$HOST "
            cd $TARGET_DIR
            chmod +x deploy.sh
            ./deploy.sh
          "
