name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, tokenizer, gd, exif, fileinfo, ctype, json

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Create storage directories
        run: |
          mkdir -p storage/framework/views
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p bootstrap/cache
          chmod -R 775 storage bootstrap/cache

      - name: Install PHP dependencies
        run: |
          COMPOSER_MEMORY_LIMIT=-1 composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Install frontend dependencies
        run: |
          npm ci
          npm install -D vite
          
      - name: Build frontend assets
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Hostinger
        env:
          HOST: ${{ secrets.HOSTINGER_HOST }}
          USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          PORT: ${{ secrets.SSH_PORT || '22' }}
          TARGET_DIR: ${{ secrets.HOSTINGER_DEPLOY_PATH || '/home/u722035022/domains/driving.mkscholars.com/laravel' }}
        run: |
          # Ensure deployment folder exists
          ssh -o StrictHostKeyChecking=no -p $PORT $USERNAME@$HOST "mkdir -p $TARGET_DIR"

          # Sync files (exclude sensitive or unnecessary files)
          rsync -avz -e "ssh -p $PORT -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='storage' \
            --exclude='public/storage' \
            ./ $USERNAME@$HOST:$TARGET_DIR/

          # Copy .env if exists locally (optional)
          if [ -f .env ]; then
            scp -P $PORT -o StrictHostKeyChecking=no .env $USERNAME@$HOST:$TARGET_DIR/.env
          fi

          # Run server-side deployment script
          ssh -o StrictHostKeyChecking=no -p $PORT $USERNAME@$HOST "
            cd $TARGET_DIR
            chmod +x deploy.sh
            ./deploy.sh
          "
